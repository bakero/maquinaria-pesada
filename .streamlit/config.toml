## MaquinarIA Pesada — tema base.
## El CSS principal lo inyecta cockpit/theme.py (Inter + JetBrains Mono,
## paleta refinada, componentes pulidos). Esto solo define los colores base
## que Streamlit aplica antes de cargar el CSS.

[theme]
base = "dark"

# CAT yellow — accent
primaryColor = "#F2C53D"

# Canvas — negro cálido (no puro)
backgroundColor = "#0B0D10"

# Surface — paneles, sidebar, cards
secondaryBackgroundColor = "#13171D"

# Texto principal
textColor = "#E8EAED"

# Fallback si la carga de Google Fonts falla. cockpit/theme.py inyecta Inter.
font = "sans serif"

[server]
headless = false
runOnSave = true

[browser]
gatherUsageStats = false
